<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  background: #F5F7F3;
  margin: 0;
  padding: 15px;
}

/* container */
.app {
  max-width: 430px;
  margin: auto;
}

/* header */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: #2E7D32;
}

/* hero */
.hero {
  background: #E8F5E9;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.hero h1 {
  margin: 0 0 10px;
}

.hero p {
  margin-bottom: 15px;
  color: #555;
}

.hero button {
  background: #2E7D32;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 14px;
  font-weight: bold;
}

/* tabs */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.tab {
  padding: 10px 16px;
  border-radius: 20px;
  border: none;
  background: #e0e0e0;
}

.tab.active {
  background: #2E7D32;
  color: white;
}

/* cards */
.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  font-weight: bold;
  margin: 5px 0;
}

.buy {
  background: #2E7D32;
  color: white;
  border: none;
  width: 100%;
  padding: 10px;
  border-radius: 12px;
}

/* how it works */
.helper {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
  text-align: center;
}

.helper button {
  background: #2E7D32;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 12px;
}

/* bottom nav */
.nav {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  border-radius: 20px;
  display: flex;
  gap: 20px;
  padding: 10px 20px;
}

.nav button {
  background: none;
  border: none;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="app">

<div class="topbar">
  <div class="logo">🦆 Swimming Bot</div>
  <button onclick="openHow()">?</button>
</div>

<div class="hero">
  <h1>Simple & Clear</h1>
  <p>Smart reminders and training management in one place</p>
  <button onclick="openBot()">Open Bot</button>
</div>

<div class="tabs">
  <button class="tab active">All</button>
  <button class="tab">Plans</button>
  <button class="tab">Training</button>
</div>

<div class="products">

<div class="card">
  <img src="https://images.unsplash.com/photo-1519315901367-f34ff9154487">
  <div class="card-content">
    <div>Standard Plan</div>
    <div class="price">€49</div>
    <button class="buy" onclick="buy()">Add to cart</button>
  </div>
</div>

<div class="card">
  <img src="https://images.unsplash.com/photo-1600965962361-9035dbfd1c50">
  <div class="card-content">
    <div>Kids Plan</div>
    <div class="price">€35</div>
    <button class="buy" onclick="buy()">Add to cart</button>
  </div>
</div>

</div>

<div class="helper">
  <h3>How it works</h3>
  <p>Just 3 simple steps</p>
  <button onclick="openHow()">Open guide</button>
</div>

</div>

<div class="nav">
  <button>🏠</button>
  <button>🛒</button>
  <button>👤</button>
</div>

<script>
function buy() {
  alert("Added!");
}

function openBot() {
  window.open("https://t.me/SwimmingNotificationsBot");
}

function openHow() {
  alert("Step 1 → Step 2 → Step 3");
}
</script>

</body>
</html>
