<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  padding: 15px;
}

.header {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 15px;
}

.menu {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  overflow-x: auto;
}

.menu button {
  background: white;
  border: none;
  padding: 10px 14px;
  border-radius: 20px;
  font-weight: bold;
}

.category {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  font-weight: bold;
  margin-top: 5px;
}

button.buy {
  width: 100%;
  margin-top: 10px;
  background: black;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

.footer {
  margin-top: 20px;
  text-align: center;
}

.footer a {
  display: block;
  background: black;
  color: white;
  padding: 12px;
  border-radius: 15px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="header">Каталог</div>

<div class="menu">
  <button>Главная</button>
  <button>Абонементы</button>
  <button>Тренировки</button>
  <button>Аксессуары</button>
</div>

<div class="category">
  <h3>Абонементы</h3>
  <p>Выбери подходящий вариант</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1519315901367-f34ff9154487">
    <div class="card-content">
      <div>Абонемент</div>
      <div class="price">€49</div>
      <button class="buy" onclick="buy()">Добавить</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600965962361-9035dbfd1c50">
    <div class="card-content">
      <div>Детский</div>
      <div class="price">€35</div>
      <button class="buy" onclick="buy()">Добавить</button>
    </div>
  </div>

</div>

<div class="footer">
  <a href="https://t.me/your_bot_username">Открыть бота</a>
</div>

<script>
function buy() {
  alert("Добавлено!");
}
</script>

</body>
</html>
